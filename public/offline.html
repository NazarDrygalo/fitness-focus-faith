<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline · GRIND</title>
    <meta name="theme-color" content="#161a22" />
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #161a22;
        color: #e6e8eb;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        padding: 24px;
      }
      .wrap { max-width: 360px; text-align: center; }
      .dot {
        width: 48px; height: 48px; border-radius: 999px;
        background: #1f2530; margin: 0 auto 20px;
        display: flex; align-items: center; justify-content: center;
        font-size: 24px;
      }
      h1 { font-size: 20px; margin: 0 0 8px; font-weight: 600; }
      p { color: #9aa3ad; font-size: 14px; line-height: 1.5; margin: 0 0 24px; }
      button {
        background: #e6e8eb; color: #161a22;
        border: 0; border-radius: 10px;
        padding: 10px 20px; font-size: 14px; font-weight: 500;
        cursor: pointer;
      }
      button:hover { opacity: 0.9; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="dot">⚡</div>
      <h1>You're offline</h1>
      <p>GRIND can't reach the network right now. Your logs are safe — reconnect to sync.</p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
